services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 20

  embeddings:
    # fastembed HTTP service (arm64-native). Replaces TEI, which has no
    # linux/arm64 image. Same surface RemoteEmbeddingProvider calls: POST /embed.
    build: .
    command: ["uv", "run", "python", "-m", "memory.embeddings_server"]
    environment:
      PORT: "80"
      EMBED_MODEL: BAAI/bge-small-en-v1.5
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:80/health')\""]
      interval: 3s
      timeout: 5s
      retries: 40

  memory:
    build: .
    depends_on:
      db:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/memory
      CODE_EMBED_PROVIDER: remote
      CODE_EMBED_URL: http://embeddings:80
      CODE_EMBED_MODEL: BAAI/bge-small-en-v1.5
      CODE_EMBED_DIM: "384"
      DOC_EMBED_PROVIDER: remote
      DOC_EMBED_URL: http://embeddings:80
      DOC_EMBED_MODEL: BAAI/bge-small-en-v1.5
      DOC_EMBED_DIM: "384"
    stdin_open: true
    tty: true

  worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/memory
      CODE_EMBED_PROVIDER: remote
      CODE_EMBED_URL: http://embeddings:80
      CODE_EMBED_MODEL: BAAI/bge-small-en-v1.5
      CODE_EMBED_DIM: "384"
      DOC_EMBED_PROVIDER: remote
      DOC_EMBED_URL: http://embeddings:80
      DOC_EMBED_MODEL: BAAI/bge-small-en-v1.5
      DOC_EMBED_DIM: "384"
    volumes:
      - ${PROJECT_DIR:-./}:/project:ro
    command: ["uv", "run", "python", "-m", "memory.run_worker", "/project"]

volumes:
  pgdata:
